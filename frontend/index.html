<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Медицинская Информационная Система</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">+</div>
                <h2>ClinicOS</h2>
            </div>
            <nav class="nav-menu">
                <button class="nav-item active" data-target="dashboard">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Дашборд
                </button>
                <button class="nav-item" data-target="calendar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    Расписание
                </button>
                <button class="nav-item" data-target="patients">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    Пациенты
                </button>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <h1>Обзор клиники</h1>
                <div class="user-profile">
                    <div class="avatar">АВ</div>
                    <span>Д-р. Александр В.</span>
                </div>
            </header>

            <div id="dashboard" class="page-view active">
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Пациентов сегодня</h3>
                        <div class="value">24</div>
                        <div class="trend positive">↑ 12% со вчера</div>
                    </div>
                    <div class="stat-card">
                        <h3>Свободных слотов</h3>
                        <div class="value">8</div>
                        <div class="trend">на текущий день</div>
                    </div>
                    <div class="stat-card">
                        <h3>Новых карт</h3>
                        <div class="value">3</div>
                        <div class="trend positive">за неделю</div>
                    </div>
                </div>
                
                <div class="recent-appointments">
                    <h2>Ближайшие приемы</h2>
                    <div id="dashboard-appointments-list" class="list-container">
                        <!-- Filled by JS -->
                    </div>
                </div>
            </div>

            <div id="calendar" class="page-view">
                <div class="calendar-header">
                    <h2>Расписание врачей</h2>
                    <input type="date" id="calendar-date" value="2026-06-18">
                </div>
                <div class="calendar-grid" id="calendar-grid">
                    <!-- Filled by JS -->
                </div>
            </div>

            <div id="patients" class="page-view">
                <div class="patients-header">
                    <h2>База пациентов</h2>
                    <div class="actions">
                        <input type="text" id="patient-search" placeholder="Поиск по ФИО или телефону..." class="search-input">
                        <button class="btn btn-primary" id="btn-new-patient">+ Новый пациент</button>
                    </div>
                </div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>ФИО</th>
                            <th>Дата рождения</th>
                            <th>Телефон</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="patients-table-body">
                        <!-- Filled by JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
